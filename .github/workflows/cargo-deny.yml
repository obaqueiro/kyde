name: cargo-deny

# Supply-chain + license gate. Runs without compiling the project, so it's
# fast and independent of the platform build matrix.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses sources bans
