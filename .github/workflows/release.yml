name: release

# release-please owns the whole release: it watches Conventional Commits on main,
# maintains a "release PR" that bumps Cargo.toml + Cargo.lock + CHANGELOG.md, and
# on merge cuts the vX.Y.Z tag + GitHub Release. The build job then signs + notarizes the
# macOS .app and attaches it to that release.
#
# macOS-only for now (see README "Known limitations"). The Linux/Windows packaging worked
# but isn't maintained, so it's parked — commented out below (matrix entries + their package
# steps), not deleted. Uncomment a platform's matrix entry AND its package step to revive it.
#
# Why build runs HERE and not via a tag trigger: tags/releases created with the
# default GITHUB_TOKEN do NOT trigger other workflows. Keeping build in the same
# run (gated on release_created) is triggered by the human merge push, so it fires.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Picks up release-please-config.json + .release-please-manifest.json.

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Serialize so the arm64 asset is uploaded FIRST. The updater shipped before per-arch
      # assets picks the *first* `.zip` in a release (it ignores names), and every existing
      # user is arm64 — so arm64 must land first or those users' old updater would grab the
      # x86_64 zip (Rosetta). New (arch-aware) updaters pick by name regardless of order.
      max-parallel: 1
      matrix:
        include:
          # Two macOS slices shipped as separate assets; the in-app updater downloads the one
          # matching the user's CPU. Both build on the Apple-Silicon runner (x86_64 via the
          # cross target) so we don't depend on the deprecating Intel runners.
          #
          # arm64 keeps the original `kyde-macos.zip` name for backwards compatibility with the
          # already-shipped (name-agnostic, first-zip) updater; the new updater treats a name
          # with no arch token as the arm64/generic build.
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            asset: kyde-macos.zip
          - name: macos-x86_64
            os: macos-15
            target: x86_64-apple-darwin
            asset: kyde-macos-x86_64.zip
          # Parked (macOS-only releases for now). These worked; to revive a platform,
          # uncomment its matrix entry here AND its package step further down.
          # - name: linux
          #   os: ubuntu-latest
          #   bin: kyde
          # - name: windows
          #   os: windows-latest
          #   bin: kyde.exe
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Parked with the Linux matrix entry above.
      # - name: Install Linux deps
      #   if: matrix.name == 'linux'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       pkg-config libssl-dev libzstd-dev \
      #       libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev \
      #       libfontconfig-dev libfreetype-dev \
      #       libx11-dev libxcb1-dev libvulkan-dev \
      #       clang cmake

      # Build the matrix arch and wrap it in Kyde.app. bundle-macos.sh ad-hoc-signs it as a
      # baseline so an unsigned bundle never ships; the next step upgrades that to Developer
      # ID + notarize.
      - name: Build + bundle .app
        if: startsWith(matrix.name, 'macos')
        run: TARGET=${{ matrix.target }} ./scripts/bundle-macos.sh

      # Developer ID sign + notarize. No-ops (keeps the ad-hoc app) until the signing secrets
      # are configured, so releases never break waiting on the Apple setup. Secrets:
      # APPLE_CERT_P12_BASE64 (base64 .p12), APPLE_CERT_P12_PASSWORD, APPLE_SIGN_IDENTITY,
      # APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID (notarize auth) — see .env / README.
      - name: Sign + notarize (Developer ID)
        if: startsWith(matrix.name, 'macos')
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERT_P12_BASE64:-}" ]; then
            echo "Signing secrets not set — shipping the ad-hoc-signed app (right-click -> Open)."
            exit 0
          fi
          # Import the Developer ID cert into a throwaway keychain.
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$APPLE_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERT_P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed -e 's/"//g')

          # Re-sign with the Developer ID identity + hardened runtime (required to notarize).
          codesign --force --timestamp --options runtime \
            --sign "$APPLE_SIGN_IDENTITY" dist/Kyde.app
          codesign --verify --strict --verbose=2 dist/Kyde.app

          # Notarize via Apple ID + app-specific password, wait for the verdict, then staple.
          ditto -c -k --keepParent dist/Kyde.app "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple dist/Kyde.app

          # Scrub secrets from the runner.
          rm -f "$RUNNER_TEMP/cert.p12" "$RUNNER_TEMP/notarize.zip"
          security delete-keychain "$KEYCHAIN"

      - name: Package .app (macos)
        if: startsWith(matrix.name, 'macos')
        run: ditto -c -k --keepParent dist/Kyde.app "${{ matrix.asset }}"

      # Parked with the Linux matrix entry above.
      # - name: Package AppImage (linux)
      #   if: matrix.name == 'linux'
      #   run: |
      #     ./scripts/bundle-linux.sh
      #     mv dist/Kyde-x86_64.AppImage kyde-linux.AppImage

      # Parked with the Windows matrix entry above.
      # - name: Package zip (windows)
      #   if: matrix.name == 'windows'
      #   shell: pwsh
      #   run: |
      #     Compress-Archive -Path target/release/${{ matrix.bin }} -DestinationPath kyde-windows.zip

      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${{ matrix.asset }}" --clobber
