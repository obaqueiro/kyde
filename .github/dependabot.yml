version: 2
updates:
  # Rust crate dependencies.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # tree-sitter core + grammars must move together (ABI alignment), so
      # batch them into one PR instead of a dozen conflicting ones.
      tree-sitter:
        patterns:
          - "tree-sitter*"
      objc2:
        patterns:
          - "objc2*"

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
